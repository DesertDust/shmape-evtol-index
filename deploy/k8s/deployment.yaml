apiVersion: apps/v1
kind: Deployment
metadata:
  name: evtol-index-web
  namespace: shmape
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evtol-index-web
  template:
    metadata:
      labels:
        app: evtol-index-web
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: runtime-permissions
          image: busybox:1.36
          command: ["/bin/sh", "-lc", "mkdir -p /var/lib/evtol-index && chown -R 10001:10001 /var/lib/evtol-index"]
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/evtol-index
      containers:
        - name: web
          image: localhost/shmape-evtol-index:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: evtol-index-config
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 4
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/evtol-index
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: evtol-index-data
        - name: tmp
          emptyDir: {}
