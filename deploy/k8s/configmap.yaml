apiVersion: v1
kind: ConfigMap
metadata:
  name: evtol-index-config
  namespace: shmape
data:
  EVTOL_INDEX_BASE_PATH: /Shmape-Homepage/evtol-index
  EVTOL_INDEX_DATABASE_PATH: /var/lib/evtol-index/index.db
  EVTOL_INDEX_ALERTS_ENABLED: "false"
  EVTOL_INDEX_WEIGHT_CAP: "0.25"
  EVTOL_INDEX_MIN_FLOAT_MARKET_CAP_USD: "50000000"
  EVTOL_INDEX_MIN_MEDIAN_DAILY_VALUE_USD: "250000"
  EVTOL_INDEX_MIN_PRICE_USD: "1.0"
  EVTOL_INDEX_MIN_TRADING_DAYS: "20"
