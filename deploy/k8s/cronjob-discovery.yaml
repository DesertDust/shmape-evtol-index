apiVersion: batch/v1
kind: CronJob
metadata:
  name: evtol-index-discovery
  namespace: shmape
spec:
  schedule: "7 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 900
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: evtol-index-worker
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: discover
              image: localhost/shmape-evtol-index:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.worker", "discover"]
              envFrom:
                - configMapRef:
                    name: evtol-index-config
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 96Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: data
                  mountPath: /var/lib/evtol-index
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: evtol-index-data
            - name: tmp
              emptyDir: {}
