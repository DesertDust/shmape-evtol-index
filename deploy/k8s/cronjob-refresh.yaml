apiVersion: batch/v1
kind: CronJob
metadata:
  name: evtol-index-refresh
  namespace: shmape
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: evtol-index-worker
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: refresh
              image: localhost/shmape-evtol-index:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.worker", "refresh"]
              envFrom:
                - configMapRef:
                    name: evtol-index-config
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              volumeMounts:
                - name: data
                  mountPath: /var/lib/evtol-index
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: evtol-index-data
            - name: tmp
              emptyDir: {}
